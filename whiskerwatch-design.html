<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .viewer-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      background: rgba(17, 17, 17, 0.96);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .viewer-header a {
      color: #f6c8d7;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .viewer-header a:hover {
      text-decoration: underline;
    }

    .viewer-header h1 {
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      flex: 1;
    }

    .viewer-open-figma {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      background: #fac8dd;
      color: #3d2a36 !important;
      font-weight: 600;
      text-decoration: none !important;
    }

    .viewer-open-figma:hover {
      background: #f2b8d4;
    }

    .viewer-frame-wrap {
      flex: 1;
      min-height: 0;
      padding: 16px;
      background: #2d2d2d;
    }

    .viewer-frame {
      width: 100%;
      height: calc(100vh - 72px);
      height: calc(100dvh - 72px);
      max-width: 1200px;
      margin: 0 auto;
      border: 0;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 768px) {
      .viewer-header {
        flex-wrap: wrap;
        padding: 12px 14px;
      }

      .viewer-header h1 {
        order: 3;
        flex-basis: 100%;
        text-align: left;
        font-size: 0.88rem;
      }

      .viewer-frame-wrap {
        padding: 8px;
      }

      .viewer-frame {
        border-radius: 8px;
        height: calc(100dvh - 96px);
      }
    }
  </style>
</head>
<body>
  <header class="viewer-header">
    <a href="index.html#projects">← Back to Portfolio</a>

      href="https://www.figma.com/design/NXHAsUWFTWf3fMkD53nkQi/WhiskerWatch?node-id=3-147"
      target="_blank"
      rel="noopener noreferrer"
    >Open in Figma</a>
  </header>

  <main class="viewer-frame-wrap">
    <iframe
      class="viewer-frame"
      title="WhiskerWatch Figma design"
      src="https://www.figma.com/embed?embed_host=share&amp;url=https%3A%2F%2Fwww.figma.com%2Fdesign%2FNXHAsUWFTWf3fMkD53nkQi%2FWhiskerWatch%3Fnode-id%3D3-147"
